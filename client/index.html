<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fabora - A Fashion Store</title>
    <meta name="description" content="Fabora - Redefining modern elegance through timeless design and premium craftsmanship." />
    <meta name="author" content="Fabora" />

    <meta property="og:title" content="Fabora - A Fashion Store" />
    <meta property="og:description" content="Redefining modern elegance through timeless design and premium craftsmanship." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800&q=80" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@fabora" />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800&q=80" />
    
    <link rel="icon" href="/headerlog.png" type="image/svg+xml" />
    
    <style>
      #fabora-splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease-out;
      }
      #fabora-splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #fabora-splash img, #fabora-splash .logo-img {
        max-width: 80%;
        max-height: 80%;
        width: auto;
        height: auto;
        object-fit: contain;
      }
    </style>
  </head>

  <body>
    <div id="fabora-splash">
      <img src="/mynewlogo.jpg" alt="Fabora" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash screen after 2 seconds
      setTimeout(function() {
        var splash = document.getElementById('fabora-splash');
        if (splash) {
          splash.classList.add('hide');
          setTimeout(function() {
            splash.style.display = 'none';
          }, 500);
        }
      }, 2000);
    </script>
  </body>
</html>
